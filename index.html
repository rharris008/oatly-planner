<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ABH — Oatly Planner</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #F5F5F5; color: #333; font-size: 10pt; min-height: 100vh; }
  :root { --navy:#1B2A4A; --red:#C0392B; --amber:#E67E22; --green:#27AE60; --blue:#0E7CCE; --white:#FFFFFF; --ltgrey:#F5F5F5; --mdgrey:#CCCCCC; --dktext:#333333; }
  .page-header { background:var(--navy); color:var(--white); padding:16px 24px; display:flex; align-items:center; justify-content:space-between; border-bottom:4px solid var(--blue); }
  .page-header h1 { font-size:20pt; font-weight:bold; }
  .page-header .subtitle { font-size:11pt; color:#8fa8c8; margin-top:2px; }
  .header-right { text-align:right; font-size:9pt; color:#8fa8c8; }
  .filter-bar { background:var(--white); border-bottom:1px solid var(--mdgrey); padding:10px 24px; display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  .filter-bar label { font-size:9pt; color:#666; margin-right:4px; }
  .filter-bar select { font-family:Arial,sans-serif; font-size:9pt; padding:5px 8px; border:1px solid var(--mdgrey); border-radius:4px; background:var(--white); color:var(--dktext); }
  .btn { font-family:Arial,sans-serif; font-size:9pt; font-weight:bold; padding:6px 14px; border:none; border-radius:4px; cursor:pointer; }
  .btn-refresh { background:var(--green); color:var(--white); }
  .summary-row { display:flex; gap:12px; padding:16px 24px; flex-wrap:wrap; }
  .tile { flex:1; min-width:160px; background:var(--white); border-radius:6px; padding:14px 16px; border-top:4px solid var(--navy); box-shadow:0 1px 4px rgba(0,0,0,.08); }
  .tile.amber{border-top-color:var(--amber)} .tile.green{border-top-color:var(--green)} .tile.red{border-top-color:var(--red)} .tile.blue{border-top-color:var(--blue)}
  .tile-label { font-size:8pt; color:#666; text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px; }
  .tile-value { font-size:18pt; font-weight:bold; color:var(--dktext); line-height:1; }
  .tile-sub { font-size:8pt; color:#999; margin-top:4px; }
  .section-header { padding:8px 24px 4px; font-size:16pt; font-weight:bold; color:var(--navy); border-bottom:2px solid var(--blue); }
  .cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(380px,1fr)); gap:16px; padding:16px 24px; }
  .sku-card { background:var(--white); border-radius:8px; box-shadow:0 1px 6px rgba(0,0,0,.1); overflow:hidden; }
  .sku-card-header { background:var(--navy); color:var(--white); padding:10px 14px; display:flex; justify-content:space-between; align-items:center; }
  .sku-card-header .sku-name { font-size:10pt; font-weight:bold; }
  .sku-card-header .sku-code { font-size:8pt; color:#8fa8c8; }
  .sku-card-body { padding:12px 14px; }
  .sku-metrics { display:flex; gap:12px; margin-bottom:12px; }
  .metric-box { flex:1; text-align:center; padding:8px 4px; border-radius:4px; background:var(--ltgrey); }
  .metric-box .m-val { font-size:14pt; font-weight:bold; color:var(--dktext); display:block; }
  .metric-box .m-lbl { font-size:7.5pt; color:#888; text-transform:uppercase; }
  .metric-box.ok{background:#e8f8ee} .metric-box.warn{background:#fef3e2} .metric-box.risk{background:#fdecea}
  .dc-table { width:100%; border-collapse:collapse; font-size:8.5pt; margin-top:4px; }
  .dc-table th { background:var(--navy); color:var(--white); padding:4px 8px; text-align:left; font-size:8pt; font-weight:bold; }
  .dc-table td { padding:4px 8px; border-bottom:1px solid var(--ltgrey); }
  .dc-table tr:last-child td { border-bottom:none; }
  .num { text-align:right; font-variant-numeric:tabular-nums; }
  .gap-val { color:var(--red); font-weight:bold; } .ok-val { color:var(--green); }
  .badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:7.5pt; font-weight:bold; text-transform:uppercase; }
  .badge-ok{background:#e8f8ee;color:var(--green)} .badge-warn{background:#fef3e2;color:var(--amber)} .badge-risk{background:#fdecea;color:var(--red)}
  .chart-section { padding:0 24px 24px; }
  .chart-card { background:var(--white); border-radius:8px; box-shadow:0 1px 6px rgba(0,0,0,.08); padding:16px; margin-top:16px; }
  .chart-title { font-size:13pt; font-weight:bold; color:var(--navy); margin-bottom:12px; border-bottom:1px solid var(--mdgrey); padding-bottom:8px; }
  .week-row { display:flex; align-items:center; gap:8px; margin-bottom:4px; font-size:8.5pt; }
  .week-label { width:90px; color:#666; flex-shrink:0; }
  .bar-wrap { flex:1; background:var(--ltgrey); border-radius:2px; height:14px; }
  .bar-fill { height:14px; border-radius:2px; }
  .week-val { width:60px; text-align:right; flex-shrink:0; }
  .loader { text-align:center; padding:48px 24px; color:#888; font-size:11pt; }
  .spinner { display:inline-block; width:28px; height:28px; border:3px solid var(--mdgrey); border-top-color:var(--blue); border-radius:50%; animation:spin .7s linear infinite; margin-right:10px; vertical-align:middle; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .page-footer { margin-top:32px; padding:10px 24px; border-top:1px solid var(--mdgrey); font-size:8pt; color:#999; display:flex; justify-content:space-between; }
</style>
</head>
<body>
<div class="page-header">
  <div>
    <h1>Oatly Planner</h1>
    <div class="subtitle">ABH — Australian Grocery Distributors | Woolworths Channel</div>
  </div>
  <div class="header-right">
    <div id="last-refresh">Loading...</div>
    <div style="margin-top:4px"><button class="btn btn-refresh" onclick="loadAll()">Refresh</button></div>
  </div>
</div>
<div class="filter-bar">
  <div><label for="sel-sku">SKU</label><select id="sel-sku" onchange="applyFilters()"><option value="">All SKUs</option></select></div>
  <div><label for="sel-dc">DC</label><select id="sel-dc" onchange="applyFilters()"><option value="">All DCs</option></select></div>
  <div><label for="sel-weeks">Weeks ahead</label>
    <select id="sel-weeks" onchange="loadAll()">
      <option value="8">8 weeks</option>
      <option value="13" selected>13 weeks</option>
      <option value="26">26 weeks</option>
      <option value="52">52 weeks</option>
    </select>
  </div>
</div>
<div class="summary-row" id="summary-tiles"><div class="loader"><span class="spinner"></span>Loading data...</div></div>
<div class="section-header" id="cards-heading" style="display:none">SKU Forecast vs Planned Orders</div>
<div class="cards-grid" id="cards-grid"></div>
<div class="chart-section">
  <div class="chart-card" id="weekly-chart-card" style="display:none">
    <div class="chart-title" id="weekly-chart-title">Weekly Forecast — All SKUs</div>
    <div id="weekly-chart-body"></div>
  </div>
</div>
<div class="page-footer">
  <span>ABH Pureau — Oatly Planner | INTERNAL - NOT FOR DISTRIBUTION</span>
  <span id="footer-gen">Generated: —</span>
</div>
<script>
const SB_URL='https://yxaebxkkclbjezffmerw.supabase.co';
const SB_KEY='sb_publishable_yLmaFw0myJv-rHuCC2LsHw_WW7d8lJn';
const HDR={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};
let _skus=[],_dcs=[],_fc=[],_ord=[];
async function sb(p){const r=await fetch(SB_URL+'/rest/v1/'+p,{headers:HDR});if(!r.ok)throw new Error('SB '+r.status+': '+await r.text());return r.json();}
function isoToday(){return new Date().toISOString().slice(0,10);}
function weeksAhead(n){const d=new Date();d.setDate(d.getDate()+n*7);return d.toISOString().slice(0,10);}
function fmtDate(iso){if(!iso)return'—';const[y,m,d]=iso.split('-');return d+'/'+m+'/'+String(y).slice(2);}
function fmtNum(n){if(n===null||n===undefined)return'—';return Number(n).toLocaleString('en-AU');}
async function loadAll(){
  document.getElementById('summary-tiles').innerHTML='<div class="loader"><span class="spinner"></span>Loading data...</div>';
  document.getElementById('cards-heading').style.display='none';
  document.getElementById('cards-grid').innerHTML='';
  document.getElementById('weekly-chart-card').style.display='none';
  try{
    const today=isoToday();
    const horizon=weeksAhead(parseInt(document.getElementById('sel-weeks').value)||13);
    [_skus,_dcs,_fc,_ord]=await Promise.all([
      sb('oatly_skus?select=*&active=eq.true&order=pack_group,sku_code'),
      sb('oatly_dcs?select=*&active=eq.true&order=dc_code'),
      sb('oatly_forecasts?select=*&week_commencing=gte.'+today+'&week_commencing=lte.'+horizon+'&order=sku_code,dc_code,week_commencing&limit=10000'),
      sb('oatly_planned_orders?select=*&week_commencing=gte.'+today+'&week_commencing=lte.'+horizon+'&order=sku_code,dc_code,week_commencing&limit=10000'),
    ]);
    populateFilters();
    applyFilters();
    const now=new Date().toLocaleString('en-AU',{timeZone:'Australia/Brisbane',hour12:false});
    document.getElementById('last-refresh').textContent='Refreshed: '+now+' AEST';
    document.getElementById('footer-gen').textContent='Generated: '+now;
  }catch(err){
    document.getElementById('summary-tiles').innerHTML='<div class="loader" style="color:var(--red)">Error: '+err.message+'</div>';
  }
}
function populateFilters(){
  const ss=document.getElementById('sel-sku'),sd=document.getElementById('sel-dc');
  const ps=ss.value,pd=sd.value;
  ss.innerHTML='<option value="">All SKUs</option>'+_skus.map(s=>'<option value="'+s.sku_code+'">'+s.description+' ('+s.sku_code+')</option>').join('');
  sd.innerHTML='<option value="">All DCs</option>'+_dcs.map(d=>'<option value="'+d.dc_code+'">'+d.dc_name+' ('+d.dc_code+')</option>').join('');
  if(ps)ss.value=ps; if(pd)sd.value=pd;
}
function applyFilters(){
  const fs=document.getElementById('sel-sku').value,fd=document.getElementById('sel-dc').value;
  const skus=_skus.filter(s=>!fs||s.sku_code===fs);
  const fc=_fc.filter(f=>(!fs||f.sku_code===fs)&&(!fd||String(f.dc_code)===String(fd)));
  const ord=_ord.filter(o=>(!fs||o.sku_code===fs)&&(!fd||String(o.dc_code)===String(fd)));
  renderSummary(skus,fc,ord);
  renderCards(skus,fc,ord,fd);
  renderWeeklyChart(fc,ord);
}
function renderSummary(skus,fc,ord){
  const tFc=fc.reduce((s,f)=>s+(f.forecast_qty||0),0);
  const tOrd=ord.reduce((s,o)=>s+(o.planned_qty||0),0);
  const gap=tFc-tOrd;
  const weeks=[...new Set(fc.map(f=>f.week_commencing))].length;
  const pct=tFc>0?Math.round(tOrd/tFc*100):0;
  const cc=pct>=90?'green':pct>=70?'amber':'red';
  document.getElementById('summary-tiles').innerHTML=`
    <div class="tile blue"><div class="tile-label">Active SKUs</div><div class="tile-value">${skus.length}</div><div class="tile-sub">Oatly via AGD/WW</div></div>
    <div class="tile"><div class="tile-label">Total Forecast</div><div class="tile-value">${fmtNum(tFc)}</div><div class="tile-sub">${weeks} weeks · cases</div></div>
    <div class="tile"><div class="tile-label">Planned Orders</div><div class="tile-value">${fmtNum(tOrd)}</div><div class="tile-sub">cases in period</div></div>
    <div class="tile ${cc}"><div class="tile-label">Coverage</div><div class="tile-value">${pct}%</div><div class="tile-sub">${gap>=0?'Gap: '+fmtNum(gap):'Surplus: '+fmtNum(-gap)} cases</div></div>
    <div class="tile ${gap>0?'red':'green'}"><div class="tile-label">${gap>0?'Unfilled':'Surplus'}</div><div class="tile-value">${fmtNum(Math.abs(gap))}</div><div class="tile-sub">cases ${gap>0?'not ordered':'over forecast'}</div></div>`;
}
function renderCards(skus,fc,ord,fd){
  const heading=document.getElementById('cards-heading'),grid=document.getElementById('cards-grid');
  if(!skus.length){heading.style.display='none';grid.innerHTML='<div class="loader">No data for selected filters.</div>';return;}
  heading.style.display='block';
  const dcs=fd?_dcs.filter(d=>String(d.dc_code)===String(fd)):_dcs;
  grid.innerHTML=skus.map(sku=>{
    const sfc=fc.filter(f=>f.sku_code===sku.sku_code);
    const sord=ord.filter(o=>o.sku_code===sku.sku_code);
    const tFc=sfc.reduce((s,f)=>s+(f.forecast_qty||0),0);
    const tOrd=sord.reduce((s,o)=>s+(o.planned_qty||0),0);
    const gap=tFc-tOrd;
    const pct=tFc>0?Math.round(tOrd/tFc*100):0;
    const bc=pct>=90?'badge-ok':pct>=70?'badge-warn':'badge-risk';
    const bt=pct>=90?'On Track':pct>=70?'At Risk':'Gap';
    const dcRows=dcs.map(dc=>{
      const dcFc=sfc.filter(f=>String(f.dc_code)===String(dc.dc_code)).reduce((s,f)=>s+(f.forecast_qty||0),0);
      const dcOrd=sord.filter(o=>String(o.dc_code)===String(dc.dc_code)).reduce((s,o)=>s+(o.planned_qty||0),0);
      if(!dcFc&&!dcOrd)return'';
      const dcGap=dcFc-dcOrd;
      return`<tr><td>${dc.dc_name}</td><td class="num">${fmtNum(dcFc)}</td><td class="num">${fmtNum(dcOrd)}</td><td class="num ${dcGap>0?'gap-val':'ok-val'}">${dcGap>0?'('+fmtNum(dcGap)+')':'+'+fmtNum(-dcGap)}</td></tr>`;
    }).join('');
    return`<div class="sku-card">
      <div class="sku-card-header">
        <div><div class="sku-name">${sku.description}</div><div class="sku-code">${sku.sku_code} | ${sku.pack_group||'—'}</div></div>
        <span class="badge ${bc}">${bt}</span>
      </div>
      <div class="sku-card-body">
        <div class="sku-metrics">
          <div class="metric-box"><span class="m-val">${fmtNum(tFc)}</span><span class="m-lbl">Forecast</span></div>
          <div class="metric-box ${pct>=90?'ok':pct>=70?'warn':'risk'}"><span class="m-val">${fmtNum(tOrd)}</span><span class="m-lbl">Ordered</span></div>
          <div class="metric-box ${gap>0?'risk':'ok'}"><span class="m-val">${gap>0?'('+fmtNum(gap)+')':fmtNum(-gap)}</span><span class="m-lbl">${gap>0?'Gap':'Surplus'}</span></div>
          <div class="metric-box"><span class="m-val">${pct}%</span><span class="m-lbl">Coverage</span></div>
        </div>
        ${dcRows?`<table class="dc-table"><thead><tr><th>DC</th><th class="num">Forecast</th><th class="num">Ordered</th><th class="num">Gap/Sur</th></tr></thead><tbody>${dcRows}</tbody></table>`:'<div style="color:#999;font-size:8pt;text-align:center;padding:8px">No DC data in range</div>'}
      </div></div>`;
  }).join('');
}
function renderWeeklyChart(fc,ord){
  const card=document.getElementById('weekly-chart-card'),body=document.getElementById('weekly-chart-body');
  if(!fc.length){card.style.display='none';return;}
  card.style.display='block';
  const wm={};
  fc.forEach(f=>{if(!wm[f.week_commencing])wm[f.week_commencing]={fc:0,ord:0};wm[f.week_commencing].fc+=(f.forecast_qty||0);});
  ord.forEach(o=>{if(!wm[o.week_commencing])wm[o.week_commencing]={fc:0,ord:0};wm[o.week_commencing].ord+=(o.planned_qty||0);});
  const weeks=Object.keys(wm).sort().slice(0,26);
  const maxV=Math.max(...weeks.map(w=>Math.max(wm[w].fc,wm[w].ord)),1);
  document.getElementById('weekly-chart-title').textContent='Weekly Forecast vs Planned Orders ('+weeks.length+' weeks)';
  body.innerHTML=`<div style="font-size:8pt;color:#666;margin-bottom:8px;display:flex;gap:16px">
    <span style="display:inline-flex;align-items:center;gap:4px"><span style="width:12px;height:12px;background:var(--blue);border-radius:2px;display:inline-block"></span> Forecast</span>
    <span style="display:inline-flex;align-items:center;gap:4px"><span style="width:12px;height:12px;background:var(--green);border-radius:2px;display:inline-block"></span> Planned Orders</span>
  </div>`+weeks.map(w=>{
    const d=wm[w],fp=Math.round(d.fc/maxV*100),op=Math.round(d.ord/maxV*100),gap=d.fc-d.ord;
    return`<div style="margin-bottom:8px">
      <div style="font-size:8pt;color:#555;margin-bottom:2px;font-weight:bold">w/c ${fmtDate(w)} <span style="font-weight:normal;color:${gap>0?'var(--red)':'var(--green)'}">— ${gap>0?'Gap '+fmtNum(gap):'Covered +'+fmtNum(-gap)}</span></div>
      <div class="week-row"><div class="week-label" style="font-size:7.5pt">Forecast</div><div class="bar-wrap"><div class="bar-fill" style="width:${fp}%;background:var(--blue)"></div></div><div class="week-val">${fmtNum(d.fc)}</div></div>
      <div class="week-row"><div class="week-label" style="font-size:7.5pt">Ordered</div><div class="bar-wrap"><div class="bar-fill" style="width:${op}%;background:var(--green)"></div></div><div class="week-val">${fmtNum(d.ord)}</div></div>
    </div>`;
  }).join('');
}
document.addEventListener('DOMContentLoaded',loadAll);
</script>
</body>
</html>
